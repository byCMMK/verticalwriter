<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>revise</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400&family=Gowun+Dodum&family=Gowun+Batang&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic&family=IBM+Plex+Mono:wght@300;400&family=Barlow:ital,wght@1,800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/packages/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root {
  --bg:#F7F7F5;--text:#2A2A2A;--ph:#9aa0ac;
  --toolbar:#1c2028;--tb-text:#b8c0cc;--tb-btn:#242a34;--tb-bd:#323848;
  --accent:#5c6880;--sep:#2a3040;
  --sb-bg:rgba(18,20,28,0.90);--sb-text:#9aa0ac;
  --lbl-color:#5c6880;
  --grape-panel-bg:#e6e8ee;--grape-panel-bd:#c8ccd8;
  --grape-text:#1e2230;--grape-sub:#7a8494;
  --grape-input-bg:#f2f3f7;--grape-input-bd:#bcc0cc;
}
body.dark {
  --bg:#1F2326;--text:#DCE1E3;--ph:#4a5060;
  --toolbar:#0c0e14;--tb-text:#8898a8;--tb-btn:#141820;--tb-bd:#202838;
  --accent:#5c6880;--sep:#181e28;
  --sb-bg:rgba(8,10,14,0.95);--sb-text:#7a8899;--lbl-color:#6878a0;
  --grape-panel-bg:#131820;--grape-panel-bd:#1e2838;
  --grape-text:#c8d0dc;--grape-sub:#7a8899;
  --grape-input-bg:#131820;--grape-input-bd:#222a38;
}
body.sepia {
  --bg:#F1EAD7;--text:#322A21;--ph:#b8a080;
  --toolbar:#e4dac8;--tb-text:#6e5840;--tb-btn:#ece4d0;--tb-bd:#cebfa0;
  --accent:#7a5e38;--sep:#cebfa0;
  --sb-bg:rgba(228,218,200,0.95);--sb-text:#6e5840;--lbl-color:#7a5e38;
  --grape-panel-bg:#e6dac4;--grape-panel-bd:#cebfa0;
  --grape-text:#322A21;--grape-sub:#8a6e50;
  --grape-input-bg:#ede4ce;--grape-input-bd:#cebfa0;
}
body.chalkboard {
  --bg:#2C4946;--text:#C8D8D4;--ph:#5a8880;
  --toolbar:#1e3532;--tb-text:#90b8b0;--tb-btn:#263e3a;--tb-bd:#3a5e58;
  --accent:#70b0a8;--sep:#1e3532;
  --sb-bg:rgba(20,48,44,0.95);--sb-text:#80a8a0;--lbl-color:#70b0a8;
  --grape-panel-bg:#1e3532;--grape-panel-bd:#3a5e58;
  --grape-text:#c0d4d0;--grape-sub:#689890;
  --grape-input-bg:#1e3532;--grape-input-bd:#3a5e58;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;transition:background .3s,color .3s;}

/* ── 툴바 ── */
#toolbar{
  height:48px;background:var(--toolbar);border-bottom:2px solid var(--accent);
  display:flex;align-items:center;padding:0 10px;gap:4px;
  z-index:200;flex-shrink:0;overflow-x:auto;overflow-y:hidden;
  position:relative;
}
#toolbar::-webkit-scrollbar{display:none;}
.app-title{font-family:'Barlow',sans-serif;color:var(--accent);font-size:20px;font-weight:800;font-style:italic;letter-spacing:-0.03em;margin-right:4px;user-select:none;flex-shrink:0;}
.lbl{color:var(--lbl-color);font-size:10px;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.sep{width:1px;height:20px;background:var(--sep);margin:0 4px;flex-shrink:0;}
.tb-spacer{flex:1;min-width:6px;}
.tb-btn{background:var(--tb-btn);border:1px solid var(--tb-bd);color:var(--tb-text);border-radius:5px;padding:4px 8px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s,border-color .15s,color .3s;}
.tb-btn:hover{border-color:var(--accent);color:var(--accent);}
.tb-btn.on{background:var(--accent);color:#1a1a1a;border-color:var(--accent);}

/* ── 글꼴 드롭다운 ── */
#font-dropdown-wrap{position:relative;flex-shrink:0;}
#font-dropdown{
  display:none;position:fixed;
  background:var(--grape-panel-bg);border:1px solid var(--grape-panel-bd);
  border-radius:10px;padding:14px 16px;
  box-shadow:0 12px 40px rgba(0,0,0,0.35);
  z-index:9999;min-width:260px;
}
#font-dropdown.open{display:block;}
.fd-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--grape-panel-bd);gap:12px;}
.fd-row:last-child{border-bottom:none;padding-bottom:0;}
.fd-label{font-size:11px;color:var(--grape-sub);flex-shrink:0;}
.fd-select{background:var(--grape-input-bg);border:1px solid var(--grape-input-bd);color:var(--grape-text);border-radius:5px;padding:4px 7px;font-size:12px;font-family:inherit;outline:none;cursor:pointer;transition:border-color .15s;}
.fd-select:hover,.fd-select:focus{border-color:var(--accent);}

/* ── 메인 ── */
#main{display:flex;height:calc(100vh - 48px - 28px);overflow:hidden;}

.pane{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#pane-old{border-right:1px solid var(--sep);}

.pane-header{
  height:34px;display:flex;align-items:center;justify-content:space-between;
  padding:0 12px 0 16px;border-bottom:1px solid var(--sep);flex-shrink:0;gap:8px;
  background:rgba(0,0,0,0.06);
}
body.dark .pane-header{background:rgba(0,0,0,0.20);}
body.chalkboard .pane-header{background:rgba(0,0,0,0.10);}
.pane-header-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.pane-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--lbl-color);font-weight:400;user-select:none;flex-shrink:0;}
.width-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.width-label{font-size:10px;color:var(--lbl-color);opacity:.7;letter-spacing:.05em;white-space:nowrap;}
.width-input{width:46px;background:transparent;border:none;border-bottom:1px solid var(--sep);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;text-align:center;outline:none;padding:1px 2px;transition:border-color .15s;}
.width-input:focus{border-bottom-color:var(--accent);}
.width-unit{font-size:10px;color:var(--lbl-color);opacity:.6;}
.pane-count{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ph);letter-spacing:.04em;flex-shrink:0;}

/* ── 에디터 ── */
.editor{
  flex:1;overflow-y:auto;overflow-x:hidden;outline:none;
  white-space:pre-wrap;word-break:keep-all;overflow-wrap:break-word;
  caret-color:var(--accent);
  font-family:'Noto Serif KR',serif;font-size:21px;line-height:1.9;font-weight:500;
  color:var(--text);transition:color .3s;
  padding:28px 36px;
  /* 개별 스크롤바 숨김 — 터치로만 스크롤 */
  scrollbar-width:none;
}
.editor::-webkit-scrollbar{display:none;}
.editor[data-empty="true"]::before{content:attr(data-placeholder);color:var(--ph);pointer-events:none;font-style:italic;font-size:.75em;opacity:.7;}
/* 들여쓰기: div 기반 줄바꿈 */
.editor > div { text-indent:1em; }
.editor > div:empty { text-indent:0; }

/* ── 가운데 공유 스크롤바 ── */
#shared-scroll{
  width:14px;flex-shrink:0;
  background:var(--toolbar);
  border-left:1px solid var(--sep);
  border-right:1px solid var(--sep);
  position:relative;overflow:hidden;cursor:pointer;
  touch-action:none;
  z-index:10;
}
#scroll-thumb{
  position:absolute;left:2px;right:2px;
  background:var(--accent);border-radius:4px;
  opacity:0.55;transition:opacity .15s;
  cursor:grab;min-height:24px;
}
#scroll-thumb:active,#scroll-thumb.dragging{opacity:0.85;cursor:grabbing;}

/* ── 상태바 ── */
#statusbar{
  height:28px;background:var(--sb-bg);backdrop-filter:blur(6px);
  display:flex;align-items:center;padding:0 14px;gap:16px;
  font-size:11px;color:var(--sb-text);font-family:'IBM Plex Mono',monospace;
  letter-spacing:.04em;flex-shrink:0;transition:background .3s,color .3s;
}
.s-label{opacity:.6;margin-right:3px;}
.diff-pos{color:var(--accent);}
.diff-neg{opacity:.7;}
.s-spacer{flex:1;}
#sb-info{opacity:.45;font-size:10px;display:flex;gap:12px;}
#sb-autosave{font-size:10px;opacity:.5;}

/* ── 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--grape-panel-bg);border:1px solid var(--grape-panel-bd);border-radius:12px;padding:22px 24px;width:460px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-title{font-family:'Barlow',sans-serif;font-weight:800;font-size:15px;letter-spacing:-0.04em;color:var(--accent);margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--grape-sub);margin-bottom:14px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid var(--grape-panel-bd);margin-top:4px;}
.no-chapters{padding:20px 10px;text-align:center;color:var(--grape-sub);font-size:12px;line-height:1.7;}
.save-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--grape-panel-bd);gap:12px;}
.save-row:last-child{border-bottom:none;}
.save-label{font-size:12px;color:var(--grape-sub);}
</style>
</head>
<body>

<div id="toolbar">
  <!-- 왼쪽: Original -->
  <span class="lbl">Original</span>
  <button class="tb-btn" onclick="triggerFileLoad('old')">불러오기</button>
  <button class="tb-btn" onclick="clearPane('old')">Clear</button>

  <div class="tb-spacer"></div>

  <!-- 가운데: 공통 -->
  <button class="tb-btn" onclick="copyOldToNew()">→</button>
  <button class="tb-btn" onclick="copyNewToOld()">←</button>
  <div class="sep"></div>
  <button class="tb-btn" id="sync-btn" onclick="toggleScrollSync()">⇅ 스크롤</button>
  <div class="sep"></div>
  <button class="tb-btn" onclick="openSaveModal()">저장</button>
  <div class="sep"></div>
  <button class="tb-btn" id="space-btn" onclick="toggleSpaceCount()">공백 제외</button>
  <div class="sep"></div>

  <!-- 글꼴 드롭다운 -->
  <div id="font-dropdown-wrap">
    <button class="tb-btn" id="font-btn" onclick="toggleFontDropdown()">글꼴 ▾</button>
    <div id="font-dropdown">
      <div class="fd-row">
        <span class="fd-label">폰트</span>
        <select class="fd-select" id="fd-font" onchange="applyTypoFromPanel()">
          <option value="'Pretendard',sans-serif">프리텐다드</option>
          <option value="'Noto Serif KR',serif">노토 세리프</option>
          <option value="'Noto Sans KR',sans-serif">노토 산스</option>
          <option value="'Gowun Batang',serif">고운 바탕</option>
          <option value="'Gowun Dodum',sans-serif">고운 돋움</option>
          <option value="'Nanum Myeongjo',serif">나눔 명조</option>
          <option value="'Nanum Gothic',sans-serif">나눔 고딕</option>
          <option value="'IBM Plex Mono',monospace">IBM Plex Mono</option>
        </select>
      </div>
      <div class="fd-row">
        <span class="fd-label">크기</span>
        <select class="fd-select" id="fd-size" onchange="applyTypoFromPanel()">
          <option value="15">15</option><option value="16">16</option><option value="17">17</option>
          <option value="18">18</option><option value="19">19</option><option value="20">20</option>
          <option value="21" selected>21</option><option value="22">22</option>
          <option value="24">24</option><option value="26">26</option>
          <option value="28">28</option><option value="30">30</option>
        </select>
      </div>
      <div class="fd-row">
        <span class="fd-label">줄간격</span>
        <select class="fd-select" id="fd-lh" onchange="applyTypoFromPanel()">
          <option value="1.4">1.4</option><option value="1.5">1.5</option>
          <option value="1.6">1.6</option><option value="1.7">1.7</option>
          <option value="1.8">1.8</option><option value="1.9" selected>1.9</option>
          <option value="2.0">2.0</option><option value="2.1">2.1</option>
          <option value="2.2">2.2</option><option value="2.4">2.4</option>
          <option value="2.6">2.6</option>
        </select>
      </div>
    </div>
  </div>

  <div class="sep"></div>
  <button class="tb-btn" onclick="cycleColorMode()">◐</button>

  <div class="tb-spacer"></div>

  <!-- 오른쪽: Revised (Load/Clear 먼저, 레이블 맨 끝) -->
  <button class="tb-btn" onclick="triggerFileLoad('new')">불러오기</button>
  <button class="tb-btn" onclick="clearPane('new')">Clear</button>
  <span class="lbl">Revised</span>
</div>

<!-- 숨겨진 파일 input -->
<input type="file" id="file-input-old" accept=".txt,.md" style="display:none" onchange="handleFileLoad(event,'old')">
<input type="file" id="file-input-new" accept=".txt,.md" style="display:none" onchange="handleFileLoad(event,'new')">

<div id="main">
  <!-- 구버전 패인 -->
  <div class="pane" id="pane-old">
    <div class="pane-header">
      <div class="pane-header-left">
        <div class="width-wrap">
          <span class="width-label">width</span>
          <input class="width-input" id="width-old" type="number" min="200" max="1600" value="600"
            onchange="applyPaneWidth('old')" onkeydown="if(event.key==='Enter')this.blur()">
          <span class="width-unit">px</span>
        </div>
      </div>
      <span class="pane-count" id="count-old">0자</span>
    </div>
    <div class="editor" id="editor-old" contenteditable="true" spellcheck="false"
      data-placeholder="Paste or load original text"></div>
  </div>

  <!-- 가운데 공유 스크롤바 -->
  <div id="shared-scroll">
    <div id="scroll-thumb"></div>
  </div>

  <!-- 신버전 패인 -->
  <div class="pane" id="pane-new">
    <div class="pane-header">
      <div class="pane-header-left">
        <div class="width-wrap">
          <span class="width-label">width</span>
          <input class="width-input" id="width-new" type="number" min="200" max="1600" value="600"
            onchange="applyPaneWidth('new')" onkeydown="if(event.key==='Enter')this.blur()">
          <span class="width-unit">px</span>
        </div>
      </div>
      <span class="pane-count" id="count-new">0자</span>
    </div>
    <div class="editor" id="editor-new" contenteditable="true" spellcheck="false"
      data-placeholder="Paste or load revised text"></div>
  </div>
</div>

<div id="statusbar">
  <span><span class="s-label">원본</span><span id="sb-old">0자</span></span>
  <span><span class="s-label">수정본</span><span id="sb-new">0자</span></span>
  <span><span class="s-label">차이</span><span id="sb-diff">—</span></span>
  <span class="s-spacer"></span>
  <span id="sb-autosave"></span>
  <div id="sb-info"><span id="sb-font"></span></div>
</div>

<!-- 저장 모달 -->
<div class="modal-overlay" id="save-modal">
  <div class="modal">
    <div class="modal-title">저장</div>
    <div class="modal-sub" style="margin-bottom:18px">각 버전을 .txt 파일로 저장해</div>
    <div class="save-row">
      <span class="save-label">원본</span>
      <button class="tb-btn" onclick="savePane('old')">↓ original.txt</button>
    </div>
    <div class="save-row">
      <span class="save-label">수정본</span>
      <button class="tb-btn" onclick="savePane('new')">↓ revised.txt</button>
    </div>
    <div class="save-row">
      <span class="save-label">둘 다</span>
      <button class="tb-btn" onclick="savePane('both')">↓ 둘 다 저장</button>
    </div>
    <div class="modal-footer">
      <button class="tb-btn" onclick="closeModal('save-modal')">닫기</button>
    </div>
  </div>
</div>

<script>
// ── 참조 ──────────────────────────────────────────
const editorOld = document.getElementById('editor-old');
const editorNew = document.getElementById('editor-new');
const sharedScroll = document.getElementById('shared-scroll');
const scrollThumb  = document.getElementById('scroll-thumb');

// ── 컬러 모드 ──────────────────────────────────────
const COLOR_MODES = ['light','sepia','chalkboard','dark'];
let colorMode = 'light';
function applyColorMode(mode) {
  colorMode = mode;
  document.body.classList.remove('dark','sepia','chalkboard');
  if (mode==='dark') document.body.classList.add('dark');
  else if (mode==='sepia') document.body.classList.add('sepia');
  else if (mode==='chalkboard') document.body.classList.add('chalkboard');
}
function applySystemDark() {
  applyColorMode(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
}
function cycleColorMode() {
  applyColorMode(COLOR_MODES[(COLOR_MODES.indexOf(colorMode)+1) % COLOR_MODES.length]);
}
applySystemDark();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applySystemDark);

// ── 글꼴 드롭다운 ──────────────────────────────────
function toggleFontDropdown() {
  const dd  = document.getElementById('font-dropdown');
  const btn = document.getElementById('font-btn');
  const opening = !dd.classList.contains('open');
  if (opening) {
    const rect = btn.getBoundingClientRect();
    dd.style.top  = (rect.bottom + 6) + 'px';
    dd.style.left = Math.max(4, rect.left - 80) + 'px';
  }
  dd.classList.toggle('open', opening);
  btn.classList.toggle('on', opening);
}
document.addEventListener('pointerdown', e => {
  const wrap = document.getElementById('font-dropdown-wrap');
  if (!wrap.contains(e.target)) {
    document.getElementById('font-dropdown').classList.remove('open');
    document.getElementById('font-btn').classList.remove('on');
  }
});

// ── 폰트·크기·줄간격 (index 연동 없음, 독립 설정) ────
const REVISE_TYPO_KEY = 'revise-typo';
function applyTypo(font, size, lh) {
  [editorOld, editorNew].forEach(el => {
    el.style.fontFamily = font;
    el.style.fontSize   = size + 'px';
    el.style.lineHeight = lh;
  });
  const label = font.split(',')[0].replace(/'/g,'').trim();
  document.getElementById('sb-font').textContent = label + ' ' + size + 'px / ' + lh;
  updateThumb();
  // 설정 저장
  try { localStorage.setItem(REVISE_TYPO_KEY, JSON.stringify({font, size, lh})); } catch(e) {}
}
function syncPanelTypo(font, size, lh) {
  const fS = document.getElementById('fd-font');
  const sS = document.getElementById('fd-size');
  const lS = document.getElementById('fd-lh');
  [...fS.options].forEach(o => o.selected = o.value===font);
  [...sS.options].forEach(o => o.selected = o.value===String(size));
  [...lS.options].forEach(o => o.selected = o.value===String(lh));
}
function loadTypoFromStorage() {
  try {
    const s = JSON.parse(localStorage.getItem(REVISE_TYPO_KEY)||'null');
    const font = s?.font || "'Noto Serif KR',serif";
    const size = s?.size || '21';
    const lh   = s?.lh   || '1.9';
    applyTypo(font, size, lh);
    syncPanelTypo(font, size, lh);
  } catch(e) {}
}
function applyTypoFromPanel() {
  const font = document.getElementById('fd-font').value;
  const size = document.getElementById('fd-size').value;
  const lh   = document.getElementById('fd-lh').value;
  applyTypo(font, size, lh);
}
loadTypoFromStorage();

// ── 문단 너비 ──────────────────────────────────────
const WIDTH_KEY = 'revise-width';
function applyPaneWidth(which) {
  const input  = document.getElementById('width-' + which);
  const editor = which==='old' ? editorOld : editorNew;
  let val = parseInt(input.value);
  if (isNaN(val)||val<200) { val=200; input.value=200; }
  if (val>1600) { val=1600; input.value=1600; }
  editor.style.maxWidth    = val + 'px';
  editor.style.marginLeft  = 'auto';
  editor.style.marginRight = 'auto';
  updateThumb();
  // 저장
  try {
    const saved = JSON.parse(localStorage.getItem(WIDTH_KEY)||'{}');
    saved[which] = val;
    localStorage.setItem(WIDTH_KEY, JSON.stringify(saved));
  } catch(e) {}
}
function loadPaneWidths() {
  try {
    const saved = JSON.parse(localStorage.getItem(WIDTH_KEY)||'null');
    if (!saved) return;
    if (saved.old) { document.getElementById('width-old').value = saved.old; applyPaneWidth('old'); }
    if (saved.new) { document.getElementById('width-new').value = saved.new; applyPaneWidth('new'); }
  } catch(e) {}
}
loadPaneWidths();
// 저장된 게 없으면 기본값 적용
if (!localStorage.getItem(WIDTH_KEY)) { applyPaneWidth('old'); applyPaneWidth('new'); }

// ── divToText (index.html과 동일) ────────────────────
function divToText(el) {
  const divs = [...el.children].filter(n => n.nodeName === 'DIV');
  if (!divs.length) {
    return [...el.childNodes].map(n => {
      if (n.nodeName === 'BR') return '';
      return n.textContent || '';
    }).join('');
  }
  return divs.map(d => {
    const c = d.childNodes;
    if (c.length === 0) return '';
    if (c.length === 1 && c[0].nodeName === 'BR') return '';
    return [...c].map(n => {
      if (n.nodeName === 'BR') return '';
      return n.textContent || '';
    }).join('');
  }).join('\n');
}

// ── 텍스트 → editor DOM (줄 → div) ──────────────────
function textToEditor(el, text) {
  el.innerHTML = '';
  const lines = text.split('\n');
  lines.forEach(line => {
    const div = document.createElement('div');
    if (line === '') {
      div.appendChild(document.createElement('br'));
    } else {
      div.textContent = line;
    }
    el.appendChild(div);
  });
}

// ── getText: divToText 사용 ──────────────────────────
function getText(el) { return divToText(el); }

// ── 붙여넣기: plain text → div 구조로 정규화 ─────────
function handlePaste(e) {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text/plain');
  if (!text) return;
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  sel.deleteFromDocument();
  // 줄바꿈이 있으면 div 삽입, 없으면 execCommand로 단순 삽입
  if (!text.includes('\n')) {
    document.execCommand('insertText', false, text);
    return;
  }
  // 현재 커서가 있는 div 찾기
  const range = sel.getRangeAt(0);
  let node = range.startContainer;
  // 텍스트 노드면 부모로
  let curDiv = node.nodeType === Node.TEXT_NODE ? node.parentNode : node;
  // editor 바로 아래 div가 아니면 찾아 올라가기
  const editor = curDiv.closest('.editor');
  if (editor) {
    while (curDiv.parentNode !== editor && curDiv.parentNode) curDiv = curDiv.parentNode;
  }

  const lines = text.split('\n');
  // 첫 줄은 현재 위치에 삽입
  document.execCommand('insertText', false, lines[0]);
  // 나머지 줄은 새 div로
  for (let i = 1; i < lines.length; i++) {
    document.execCommand('insertParagraph', false);
    if (lines[i]) document.execCommand('insertText', false, lines[i]);
  }
}
editorOld.addEventListener('paste', handlePaste);
editorNew.addEventListener('paste', handlePaste);

// ── 공유 스크롤바 (썸 드래그) ─────────────────────────
function getScrollState() {
  const trackH = sharedScroll.clientHeight;
  const ratioOld = editorOld.scrollHeight > editorOld.clientHeight
    ? editorOld.scrollTop / (editorOld.scrollHeight - editorOld.clientHeight) : 0;
  const ratioNew = editorNew.scrollHeight > editorNew.clientHeight
    ? editorNew.scrollTop / (editorNew.scrollHeight - editorNew.clientHeight) : 0;
  const ratio = (ratioOld + ratioNew) / 2;
  const maxScrollH = Math.max(editorOld.scrollHeight, editorNew.scrollHeight);
  const maxClientH = Math.max(editorOld.clientHeight, editorNew.clientHeight);
  const thumbRatio = maxScrollH > 0 ? Math.min(1, maxClientH / maxScrollH) : 1;
  const thumbH = Math.max(32, trackH * thumbRatio);
  const thumbTop = ratio * (trackH - thumbH);
  return { ratio, thumbH, thumbTop, trackH };
}

function updateThumb() {
  const { thumbH, thumbTop } = getScrollState();
  scrollThumb.style.height = thumbH + 'px';
  scrollThumb.style.top    = thumbTop + 'px';
}

function applyRatioToEditors(ratio) {
  ratio = Math.max(0, Math.min(1, ratio));
  editorOld.scrollTop = ratio * (editorOld.scrollHeight - editorOld.clientHeight);
  editorNew.scrollTop = ratio * (editorNew.scrollHeight - editorNew.clientHeight);
}

// 썸 드래그 (터치 + 포인터 모두)
let thumbDragging = false;
let thumbDragStartY = 0;
let thumbDragStartRatio = 0;

scrollThumb.addEventListener('pointerdown', e => {
  e.preventDefault();
  e.stopPropagation();
  thumbDragging = true;
  thumbDragStartY = e.clientY;
  thumbDragStartRatio = getScrollState().ratio;
  scrollThumb.setPointerCapture(e.pointerId);
  scrollThumb.style.opacity = '0.9';
});
scrollThumb.addEventListener('pointermove', e => {
  if (!thumbDragging) return;
  const { trackH, thumbH } = getScrollState();
  const dy = e.clientY - thumbDragStartY;
  const dRatio = (trackH - thumbH) > 0 ? dy / (trackH - thumbH) : 0;
  applyRatioToEditors(thumbDragStartRatio + dRatio);
  updateThumb();
});
scrollThumb.addEventListener('pointerup', () => {
  thumbDragging = false;
  scrollThumb.style.opacity = '';
});
scrollThumb.addEventListener('pointercancel', () => {
  thumbDragging = false;
  scrollThumb.style.opacity = '';
});

// 에디터 개별 스크롤 시 thumb만 업데이트
editorOld.addEventListener('scroll', updateThumb, { passive: true });
editorNew.addEventListener('scroll', updateThumb, { passive: true });
window.addEventListener('resize', updateThumb);
requestAnimationFrame(updateThumb);


function makeAutoReplacer(editor) {
  let mutating = false, isComposing = false;
  editor.addEventListener('compositionstart', () => { isComposing = true; });
  editor.addEventListener('compositionend',   () => { isComposing = false; });

  const obs = new MutationObserver(() => {
    if (mutating || isComposing) return;
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    const node  = range.startContainer;
    if (node.nodeType !== Node.TEXT_NODE) return;
    let text = node.textContent, offset = range.startOffset, changed = false;

    // < → 「
    if (!changed && text[offset-1] === '<') {
      text = text.slice(0,offset-1) + '「' + text.slice(offset); changed = true;
    }
    // > → 」
    if (!changed && text[offset-1] === '>') {
      text = text.slice(0,offset-1) + '」' + text.slice(offset); changed = true;
    }
    // ,, → ―
    if (!changed && text.slice(0,offset).endsWith(',,')) {
      const p = offset-2; text = text.slice(0,p)+'―'+text.slice(offset); offset = p+1; changed = true;
    }
    // ... → …
    if (!changed && text.slice(0,offset).endsWith('...')) {
      const p = offset-3; text = text.slice(0,p)+'…'+text.slice(offset); offset = p+1; changed = true;
    }
    // " → 열/닫 스마트쿼트
    if (!changed && text[offset-1] === '"') {
      const b = text.slice(0,offset-1);
      const q = (b.match(/\u201C/g)||[]).length > (b.match(/\u201D/g)||[]).length ? '\u201D' : '\u201C';
      text = text.slice(0,offset-1)+q+text.slice(offset); changed = true;
    }
    // ' → 열/닫 스마트쿼트
    if (!changed && text[offset-1] === "'") {
      const b = text.slice(0,offset-1);
      const q = (b.match(/\u2018/g)||[]).length > (b.match(/\u2019/g)||[]).length ? '\u2019' : '\u2018';
      text = text.slice(0,offset-1)+q+text.slice(offset); changed = true;
    }

    if (changed) {
      mutating = true;
      node.textContent = text;
      const r = document.createRange(); r.setStart(node, offset); r.collapse(true);
      sel.removeAllRanges(); sel.addRange(r);
      setTimeout(() => { mutating = false; }, 0);
    }
  });
  obs.observe(editor, { characterData: true, subtree: true, childList: true });
}

makeAutoReplacer(editorOld);
makeAutoReplacer(editorNew);

// ── 자동 저장 ──────────────────────────────────────
const AUTOSAVE_KEY = 'revise-autosave';

function autoSave() {
  try {
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({
      old: getText(editorOld),
      new: getText(editorNew),
      savedAt: new Date().toISOString()
    }));
    const now = new Date();
    const hm  = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    document.getElementById('sb-autosave').textContent = '저장됨 ' + hm;
    setTimeout(() => {
      const el = document.getElementById('sb-autosave');
      if (el) el.textContent = '';
    }, 3000);
  } catch(e) {}
}

function loadAutoSave() {
  try {
    const s = JSON.parse(localStorage.getItem(AUTOSAVE_KEY)||'null');
    if (!s) return;
    if (s.old) { textToEditor(editorOld, s.old); }
    if (s.new) { textToEditor(editorNew, s.new); }
    updateCounts(); updateAllPlaceholders(); updateThumb();
    const d = new Date(s.savedAt);
    const hm = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    document.getElementById('sb-autosave').textContent = '복원됨 ' + hm;
    setTimeout(() => {
      const el = document.getElementById('sb-autosave');
      if (el) el.textContent = '';
    }, 4000);
  } catch(e) {}
}

// 1분마다 자동 저장
setInterval(autoSave, 60 * 1000);
// 탭 닫히기 전에도 저장
window.addEventListener('beforeunload', autoSave);
// 시작 시 복원
loadAutoSave();

// ── 스크롤 연동 ──────────────────────────────────────
let scrollSync = false;
let syncLock = false;
function toggleScrollSync() {
  scrollSync = !scrollSync;
  const btn = document.getElementById('sync-btn');
  btn.classList.toggle('on', scrollSync);
  btn.textContent = scrollSync ? '⇅ 스크롤 ON' : '⇅ 스크롤';
}
function makeSyncHandler(src, tgt) {
  return function() {
    if (!scrollSync || syncLock) return;
    syncLock = true;
    const srcMax = src.scrollHeight - src.clientHeight;
    const ratio  = srcMax > 0 ? src.scrollTop / srcMax : 0;
    tgt.scrollTop = ratio * (tgt.scrollHeight - tgt.clientHeight);
    requestAnimationFrame(() => { syncLock = false; });
  };
}
editorOld.addEventListener('scroll', makeSyncHandler(editorOld, editorNew), { passive: true });
editorNew.addEventListener('scroll', makeSyncHandler(editorNew, editorOld), { passive: true });
let countWithSpace = false;
function toggleSpaceCount() {
  countWithSpace = !countWithSpace;
  const btn = document.getElementById('space-btn');
  btn.textContent = countWithSpace ? '공백 포함' : '공백 제외';
  btn.classList.toggle('on', countWithSpace);
  updateCounts();
}
function countChars(el) {
  const raw = getText(el);
  return countWithSpace ? raw.replace(/\n/g,'').length : raw.replace(/\s/g,'').length;
}
function updateCounts() {
  const oldC = countChars(editorOld), newC = countChars(editorNew);
  const fmt = n => n.toLocaleString()+'자';
  document.getElementById('count-old').textContent = fmt(oldC);
  document.getElementById('count-new').textContent = fmt(newC);
  document.getElementById('sb-old').textContent = fmt(oldC);
  document.getElementById('sb-new').textContent = fmt(newC);
  const diffEl = document.getElementById('sb-diff');
  if (oldC===0&&newC===0) { diffEl.textContent='—'; diffEl.className=''; }
  else {
    const d = newC-oldC;
    diffEl.textContent = (d>=0?'+':'')+d.toLocaleString()+'자';
    diffEl.className = d>0?'diff-pos':d<0?'diff-neg':'';
  }
}
editorOld.addEventListener('input', updateCounts);
editorNew.addEventListener('input', updateCounts);

// ── 복사 / 비우기 ─────────────────────────────────
function copyOldToNew() {
  const t = getText(editorOld); if(!t) return;
  if(getText(editorNew)&&!confirm('수정본에 내용이 있어. 덮어쓸까?')) return;
  textToEditor(editorNew, t); updateCounts(); updateAllPlaceholders(); updateThumb();
}
function copyNewToOld() {
  const t = getText(editorNew); if(!t) return;
  if(getText(editorOld)&&!confirm('원본에 내용이 있어. 덮어쓸까?')) return;
  textToEditor(editorOld, t); updateCounts(); updateAllPlaceholders(); updateThumb();
}
function clearPane(which) {
  const el = which==='old'?editorOld:editorNew;
  const label = which==='old'?'원본':'수정본';
  if(!getText(el)) return;
  if(!confirm(label+' 내용을 지울까?')) return;
  el.innerHTML=''; updateCounts(); updateAllPlaceholders(); updateThumb();
}

// ── 파일 저장 ─────────────────────────────────────
function downloadText(filename, text) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}
function savePane(which) {
  const now = new Date();
  const stamp = now.getFullYear().toString().slice(2)
    +String(now.getMonth()+1).padStart(2,'0')
    +String(now.getDate()).padStart(2,'0');
  if(which==='old'||which==='both'){const t=getText(editorOld);if(t)downloadText('original_'+stamp+'.txt',t);}
  if(which==='new'||which==='both'){const t=getText(editorNew);if(t)downloadText('revised_'+stamp+'.txt',t);}
}
function openSaveModal() { document.getElementById('save-modal').classList.add('open'); }

// ── 파일 불러오기 ──────────────────────────────────
function triggerFileLoad(which) {
  document.getElementById('file-input-' + which).click();
}
function handleFileLoad(e, which) {
  const file = e.target.files[0];
  if (!file) return;
  const el = which==='old' ? editorOld : editorNew;
  const label = which==='old' ? '원본' : '수정본';
  if (getText(el) && !confirm(label+'에 내용이 있어. 덮어쓸까?')) {
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    textToEditor(el, ev.target.result);
    updateCounts(); updateAllPlaceholders(); updateThumb();
  };
  reader.readAsText(file, 'utf-8');
  e.target.value = ''; // 같은 파일 재선택 허용
}

// ── 모달 공통 ─────────────────────────────────────
function closeModal(id){document.getElementById(id).classList.remove('open');}
['save-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});
function escapeHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── 플레이스홀더 ──────────────────────────────────
function updatePlaceholder(el){
  if(getText(el).length===0) el.setAttribute('data-empty','true');
  else el.removeAttribute('data-empty');
}
function updateAllPlaceholders(){updatePlaceholder(editorOld);updatePlaceholder(editorNew);}
[editorOld,editorNew].forEach(el=>{
  el.addEventListener('input',()=>updatePlaceholder(el));
  updatePlaceholder(el);
});
</script>
