<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CMMK</title>
<link rel="manifest" href='data:application/json;charset=utf-8,{"name":"CMMK Writer","short_name":"CMMK","start_url":"./index.html,"display":"standalone","background_color":"#1a1a1a","theme_color":"#1a1a1a","orientation":"any","icons":[{"src":"data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 512 512%27><rect width=%27512%27 height=%27512%27 rx=%27120%27 fill=%27%231a1a1a%27/><text x=%2750%%27 y=%2750%%27 font-family=%27serif%27 font-size=%27260%27 fill=%27%23e67e22%27 text-anchor=%27middle%27 dominant-baseline=%27central%27>C</text></svg>","sizes":"512x512","type":"image/svg+xml","purpose":"any maskable"}]}'>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400&family=Gowun+Dodum&family=Gowun+Batang&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic&family=IBM+Plex+Mono:wght@300;400&family=Barlow:ital,wght@1,800&display=swap" rel="stylesheet">
<style>

#editor div, #editor p {
  text-indent: 1em;
  margin: 0;
}

body.zen-mode #editor {
  color: var(--ph) !important;
  transition: color 0.3s ease;
}
body.zen-mode .current-line {
  color: var(--text) !important;
  opacity: 1 !important;
}

#podo-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:501; align-items:center; justify-content:center; }
#podo-overlay.open { display:flex; }
#podo-panel { background:var(--grape-panel-bg); border:1px solid var(--grape-panel-bd); border-radius:14px; padding:24px; width:min(320px, 85vw); text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
#podo-panel h2 { font-family:'Barlow',sans-serif; font-weight:800; font-size:16px; color:var(--accent); margin-bottom:15px; }
#podo-display { font-family:'IBM Plex Mono', monospace; font-size:48px; color:var(--grape-text); margin:20px 0; font-weight:300; }
.podo-btns { display:flex; gap:8px; justify-content:center; margin-bottom:20px; }
.podo-btn { background:var(--grape-input-bg); border:1px solid var(--grape-input-bd); color:var(--grape-text); border-radius:6px; padding:6px 12px; font-size:12px; cursor:pointer; }
.podo-btn:hover { border-color:var(--accent); }
#podo-close { background:none; border:none; color:var(--grape-sub); font-size:11px; cursor:pointer; text-decoration:underline; }
.timer-running #podo-display { color: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ebebeb;--text:#2a2a2a;--ph:#9aa0ac;
  --toolbar:#1c2028;--tb-text:#b8c0cc;--tb-btn:#242a34;--tb-bd:#323848;
  --accent:#5c6880;--sep:#2a3040;
  --sb-bg:rgba(18,20,28,0.90);--sb-text:#5c6475;
  --fl-bg:rgba(18,20,28,0.90);
  --col-rule:rgba(92,104,128,0.18);
  --ruled-line:rgba(92,104,128,0.18);
  --lbl-color:#5c6880;
  --grape-bg:#f0f1f4;--grape-text:#1e2230;--grape-sub:#7a8494;
  --grape-panel-bg:#e6e8ee;--grape-panel-bd:#c8ccd8;
  --grape-dow:#9aa0b0;--grape-nav-bd:#bcc0cc;
  --grape-empty:#d4d8e0;--grape-filled:#4a5878;
  --grape-close-bg:#dadeea;--grape-close-bd:#bcc0cc;--grape-close-text:#384050;
  --grape-input-bg:#f2f3f7;--grape-input-bd:#bcc0cc;
}
body.dark{
  --bg:#0f1014;--text:#d4d4d4;--ph:#30343e;
  --toolbar:#0c0e14;--tb-text:#8898a8;--tb-btn:#141820;--tb-bd:#202838;
  --accent:#5c6880;--sep:#181e28;
  --sb-bg:rgba(8,10,14,0.95);--sb-text:#3c4454;
  --fl-bg:rgba(8,10,14,0.95);
  --col-rule:rgba(92,104,128,0.14);
  --ruled-line:rgba(92,104,128,0.14);
  --lbl-color:#3e4a5c;
  --grape-bg:#0f1014;--grape-text:#b8c0cc;--grape-sub:#3c4454;
  --grape-panel-bg:#131820;--grape-panel-bd:#1e2838;
  --grape-dow:#28303c;--grape-nav-bd:#222a38;
  --grape-empty:#181e28;--grape-filled:#4a5878;
  --grape-close-bg:#131820;--grape-close-bd:#222a38;--grape-close-text:#6878a0;
  --grape-input-bg:#131820;--grape-input-bd:#222a38;
}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:#111;transition:background 0.3s}

#toolbar{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--toolbar);border-bottom:2px solid var(--accent);
  display:flex;align-items:center;gap:4px;padding:0 52px 0 12px;
  z-index:200;transition:transform 0.3s ease,background 0.3s;
  overflow-x:auto;overflow-y:hidden;scrollbar-width:none;
}
#toolbar::-webkit-scrollbar{display:none}
#toolbar.hidden{transform:translateY(-54px)}
.brand{
  font-family:'Barlow',sans-serif;
  color:var(--accent);font-size:25px;
  font-weight:800;font-style:italic;
  letter-spacing:-.06em;
  margin-right:8px;white-space:nowrap;flex-shrink:0;
}
.sep{width:1px;height:20px;background:var(--sep);margin:0 4px;flex-shrink:0}
.lbl{color:var(--lbl-color);font-size:10px;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}

.tb-ul{background:none;border:none;border-bottom:1px solid transparent;color:var(--tb-text);padding:8px 2px 4px 2px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;outline:none;transition:color .15s,border-color .15s;}
.tb-ul:hover{color:var(--accent);}
.tb-ul.on{color:var(--accent);border-bottom-color:var(--accent);}

select,.tb-btn{
  background:var(--tb-btn);border:1px solid var(--tb-bd);
  color:var(--tb-text);border-radius:5px;padding:4px 8px;
  font-size:12px;font-family:inherit;cursor:pointer;
  white-space:nowrap;flex-shrink:0;outline:none;
  transition:background .15s,border-color .15s,color .3s;
}
select:focus,.tb-btn:hover{border-color:var(--accent)}
.tb-btn.on{background:var(--accent);color:#1a1a1a;border-color:var(--accent)}
select option{background:#1a1a1a}
body.dark select option{background:#111}
input[type=range]{-webkit-appearance:none;width:70px;height:3px;background:var(--tb-bd);border-radius:2px;cursor:pointer;flex-shrink:0;border:none;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent)}
.val{color:var(--accent);font-size:11px;min-width:26px;flex-shrink:0}
.spacer{flex:1;min-width:6px}

#float-btns{
  position:fixed;top:8px;right:8px;z-index:300;
  display:flex;gap:5px;
  transition:opacity 0.3s,transform 0.3s;
}
#float-btns.hide{opacity:0;pointer-events:none;transform:translateY(-8px)}
.float-btn{
  line-height:1.5;position:relative;top:4px;
  background:var(--fl-bg);border:none;color:var(--accent);
  border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;
  white-space:nowrap;transition:background .15s;
}
.float-btn:hover{background:rgba(92,104,128,.2)}
.float-btn.on{background:rgba(92,104,128,.28);}

#editor-wrap{
  position:fixed;top:52px;left:0;right:0;bottom:0;
  transition:top .3s ease,background .3s;
  background:var(--bg);overflow:hidden;
}
body.menu-hidden #editor-wrap{top:0}
#ruled-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:0;display:block}
#editor-wrap.mode-single{overflow-y:auto;overflow-x:hidden}
#editor-wrap.mode-columns{
  overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:#888 transparent;
}
#editor-wrap.mode-columns::-webkit-scrollbar{height:4px}
#editor-wrap.mode-columns::-webkit-scrollbar-thumb{background:#888;border-radius:2px}

#editor{
  position:relative;z-index:1;outline:none;
  color:var(--text);word-break:keep-all;overflow-wrap:break-word;
  font-family:'Noto Serif KR',serif;font-size:21px;line-height:1.9;font-weight:500;
  text-align:left;transition:color .3s;
}
#editor:empty::before{content:attr(data-placeholder);color:var(--ph);pointer-events:none;display:block}
#editor-wrap.mode-single #editor{width:100%;min-height:100%;column-count:unset;column-gap:unset;column-fill:unset;height:auto}
#editor-wrap.mode-columns #editor{height:calc(100% - 1px);column-fill:auto;column-rule:1px solid var(--col-rule);box-sizing:border-box;}

#statusbar{
  position:fixed;bottom:0;left:0;right:0;height:26px;
  background:var(--sb-bg);backdrop-filter:blur(6px);
  padding:0 14px;font-size:11px;color:var(--sb-text);
  display:flex;align-items:center;gap:10px;
  z-index:200;pointer-events:none;
  transition:background .3s,color .3s,opacity .3s,transform .3s;
}
#statusbar.hide{opacity:0;transform:translateY(100%);visibility:hidden}
#goal-bar-wrap{flex:0 0 80px;height:3px;background:var(--tb-bd);border-radius:2px;overflow:hidden;display:none}
#goal-bar{height:100%;width:0%;background:var(--sb-text);border-radius:2px;transition:width .4s}
#goal-pct{display:none;color:var(--sb-text)}
.sb-spacer{flex:1}
#page-ind-sb{font-size:11px;color:var(--sb-text)}
#autosave-label{font-size:10px;color:#444;letter-spacing:.04em;transition:color .4s;flex-shrink:0}
#autosave-label.saved{color:var(--accent)}

#grape-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center}
#grape-overlay.open{display:flex}
#grape-panel{background:var(--grape-panel-bg);border:1px solid var(--grape-panel-bd);border-radius:14px;padding:24px 24px 20px;width:min(400px,92vw);box-shadow:0 20px 60px rgba(0,0,0,0.3);transition:background .3s,border-color .3s}
#grape-panel h2{font-family:'Barlow',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.06em;color:var(--accent);margin-bottom:3px}
#grape-panel .sub{color:var(--grape-text);font-size:11px;margin-bottom:16px;opacity:0.6}
.grape-goal-row{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.grape-goal-row label{color:var(--grape-text);font-size:11px;white-space:nowrap}
.grape-goal-row input{background:var(--grape-input-bg);border:1px solid var(--grape-input-bd);color:var(--grape-text);border-radius:5px;padding:4px 8px;font-size:12px;width:80px;outline:none;font-family:inherit;transition:background .3s,border-color .3s,color .3s}
.grape-goal-row input:focus{border-color:var(--accent)}
.grape-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.grape-nav-btn{background:none;border:1px solid var(--grape-nav-bd);color:var(--accent);border-radius:5px;padding:3px 10px;font-size:14px;cursor:pointer;transition:border-color .15s}
.grape-nav-btn:hover{border-color:var(--accent)}
.grape-month-title{color:var(--grape-text);font-size:13px;letter-spacing:.05em}
.grape-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.grape-dow span{text-align:center;font-size:9px;color:var(--grape-dow);letter-spacing:.05em}
#grape-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:18px}
.grape{aspect-ratio:1;border-radius:50%;background:var(--grape-empty);border:1px solid rgba(0,0,0,0.06);transition:transform .15s,background .2s,box-shadow .2s;cursor:pointer;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
body.dark .grape{border-color:rgba(255,255,255,0.04)}
.grape.filled{background:var(--grape-filled)}
.grape.is-today{border:2px solid var(--accent)}
.grape.is-today.filled{background:#a855f7;box-shadow:0 0 8px rgba(168,85,247,0.45)}
.grape.empty-slot{background:transparent;border:none;pointer-events:none}
.grape.pressing{transform:scale(0.85);box-shadow:0 0 0 3px rgba(200,169,110,0.35)}
#grape-close{width:100%;padding:7px;background:var(--grape-close-bg);border:1px solid var(--grape-close-bd);color:var(--grape-close-text);border-radius:7px;font-size:12px;font-family:inherit;cursor:pointer;transition:border-color .15s,background .3s,color .3s}
#grape-close:hover{border-color:var(--accent)}

@media print{
  #toolbar,#float-btns,#statusbar,#ruled-canvas,#grape-overlay{display:none!important}
  #editor-wrap{top:0!important;bottom:0!important;position:static!important;overflow:visible!important}
  #editor{height:auto!important;width:100%!important;padding:40px!important}
}
</style>
</head>
<body>

<div id="toolbar">
  <span class="brand" onclick="location.reload()" style="cursor:pointer" title="새로고침">CMMK</span>
  <div class="sep"></div>
  <button class="tb-ul" onclick="toggleViewSettings()">보기</button>
  <div id="view-group" style="display:none;align-items:center;gap:4px;flex-shrink:0">
    <div class="sep"></div>
    <span class="lbl">Aa</span>
    <select id="fontFamily" onchange="applyStyle();saveTypoSettings()">
      <option value="'Noto Serif KR',serif">노토 세리프</option>
      <option value="'Noto Sans KR',sans-serif">노토 산스</option>
      <option value="'Gowun Batang',serif">고운 바탕</option>
      <option value="'Gowun Dodum',sans-serif">고운 돋움</option>
      <option value="'Nanum Myeongjo',serif">나눔 명조</option>
      <option value="'Nanum Gothic',sans-serif">나눔 고딕</option>
      <option value="'IBM Plex Mono',monospace">IBM Plex Mono</option>
    </select>
    <div class="sep"></div>
    <span class="lbl">T↕</span>
    <select id="fontSize" onchange="applyStyle();saveTypoSettings()">
      <option value="16">16px</option>
      <option value="17">17px</option><option value="18">18px</option>
      <option value="19">19px</option><option value="20">20px</option>
      <option value="21">21px</option><option value="22" selected>22px</option>
      <option value="24">24px</option><option value="26">26px</option>
      <option value="28">28px</option>
    </select>
    <div class="sep"></div>
    <span class="lbl">¶</span>
    <select id="lineHeight" onchange="applyStyle();saveTypoSettings()">
      <option value="1.50">1.50</option>
      <option value="1.55">1.55</option>
      <option value="1.60">1.60</option>
      <option value="1.65">1.65</option>
      <option value="1.70">1.70</option>
      <option value="1.75">1.75</option>
      <option value="1.80">1.80</option>
      <option value="1.85" selected>1.85</option>
      <option value="1.90">1.90</option>
      <option value="1.95">1.95</option>
      <option value="2.00">2.00</option>
    </select>
    <div class="sep"></div>
    <button class="tb-btn"    id="c1" onclick="setCols(1)">1단</button>
    <button class="tb-btn on" id="c2" onclick="setCols(2)">2단</button>
    <button class="tb-btn"    id="c3" onclick="setCols(3)">3단</button>
  </div>
  <div class="sep"></div>
  <button class="tb-ul" onclick="openSettings()">설정</button>
  <div class="sep"></div>
  <button class="tb-ul" id="zen-btn" onclick="toggleZenMode()">✦ 집중 모드</button>
<div class="sep"></div> 
 <button class="tb-ul" id="dark-btn" onclick="toggleDark()">☽ 다크 모드</button>
  <div class="sep"></div>
  <button class="tb-ul" onclick="copyAllText()">⎘ 복사</button>
<div class="sep"></div>
  <button class="tb-ul" onclick="openFileManager()">▤ 파일 관리</button>
  <div class="spacer"></div>
</div>

<div id="float-btns">
  <button class="float-btn" id="fs-btn"    onclick="toggleFullscreen()">⛶  전체 화면</button>
  <button class="float-btn"                onclick="openGrape()">⁂ 포도밭</button>
  <button class="float-btn" id="podo-float" onclick="openPodo()">◷ 타이머</button>
  <button class="float-btn" id="menu-btn"  onclick="toggleMenu()">▲ 메뉴</button>
</div>

<div id="editor-wrap" class="mode-columns">
  <canvas id="ruled-canvas"></canvas>
  <div id="editor" contenteditable="true"
    data-placeholder="여기에 글을 쓰세요..."
    oninput="onEdit()"
    onkeydown="handleKey(event)"></div>
</div>

<!-- 찾기 바 -->
<div id="find-bar" style="display:none;position:fixed;bottom:26px;left:0;right:0;z-index:201;background:var(--toolbar);border-top:1px solid var(--tb-bd);padding:6px 14px;align-items:center;gap:8px">
  <input id="find-input" type="search" placeholder="찾기..." autocomplete="off"
    style="flex:1;background:var(--tb-btn);border:1px solid var(--tb-bd);color:var(--tb-text);border-radius:5px;padding:5px 8px;font-size:13px;font-family:inherit;outline:none"
    oninput="findText()" onkeydown="findKeyNav(event)">
  <span id="find-count" style="font-size:11px;color:var(--sb-text);white-space:nowrap;min-width:40px"></span>
  <button onclick="findMove(-1)" style="background:var(--tb-btn);border:1px solid var(--tb-bd);color:var(--tb-text);border-radius:5px;padding:4px 8px;cursor:pointer;font-size:12px">▲</button>
  <button onclick="findMove(1)"  style="background:var(--tb-btn);border:1px solid var(--tb-bd);color:var(--tb-text);border-radius:5px;padding:4px 8px;cursor:pointer;font-size:12px">▼</button>
  <button onclick="closeFind()" style="background:none;border:none;color:var(--sb-text);font-size:16px;cursor:pointer;padding:0 4px">✕</button>
</div>

<div id="statusbar">
  <span id="s-chars">글자 0</span><span>·</span>
  <span id="s-words">단어 0</span><span>·</span>
  <span id="s-lines">줄 1</span>
  <span id="goal-pct"></span>
  <div id="goal-bar-wrap"><div id="goal-bar"></div></div>
  <div class="sb-spacer"></div>
  <span id="page-ind-sb"></span>
  <span id="autosave-label">—</span>
</div>

<div id="grape-overlay" onclick="closeGrapeOutside(event)">
  <div id="grape-panel">
    <h2>🍇 포도밭</h2>
    <p class="sub">목표 글자수를 달성한 날 포도알을 획득해요</p>
    <div class="grape-goal-row">
      <label>일일 목표</label>
      <input type="number" id="grape-goal-input" min="100" max="99999" step="100" value="3000" oninput="saveGoal()">
      <span style="color:var(--grape-text);font-size:11px">글자</span>
    </div>
    <div id="grape-stats" style="display:flex;gap:12px;margin-bottom:16px;font-size:11px;color:var(--grape-text)">
      <span>오늘 <b id="stat-today">0</b>자</span>
      <span>어제 <b id="stat-yesterday">0</b>자</span>
      <span>누적 <b id="stat-total">0</b>자</span>
    </div>
    <div class="grape-nav">
      <button class="grape-nav-btn" onclick="moveMonth(-1)">‹</button>
      <span class="grape-month-title" id="grape-month-title"></span>
      <button class="grape-nav-btn" onclick="moveMonth(1)">›</button>
    </div>
    <div class="grape-dow">
      <span>일</span><span>월</span><span>화</span><span>수</span>
      <span>목</span><span>금</span><span>토</span>
    </div>
    <div id="grape-grid"></div>
    <button id="grape-close" onclick="closeGrape()">닫기</button>
  </div>
</div>

<!-- 설정 패널 -->
<div id="settings-overlay" onclick="closeSettingsOutside(event)" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center">
  <div style="background:var(--grape-panel-bg);border:1px solid var(--grape-panel-bd);border-radius:14px;padding:24px;width:min(380px,94vw);box-shadow:0 20px 60px rgba(0,0,0,0.3)">
    <h2 style="font-family:'Barlow',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.06em;color:var(--accent);margin-bottom:14px">설정</h2>

    <!-- 탭 버튼 -->
    <div style="display:flex;gap:4px;margin-bottom:16px">
      <button id="stab-general" onclick="switchSettingsTab('general')" style="background:var(--accent);color:#1a1a1a;border:1px solid var(--accent);border-radius:5px;padding:4px 10px;font-size:11px;font-family:inherit;cursor:pointer">일반</button>
      <button id="stab-replace" onclick="switchSettingsTab('replace')" style="background:var(--grape-input-bg);color:var(--grape-text);border:1px solid var(--grape-input-bd);border-radius:5px;padding:4px 10px;font-size:11px;font-family:inherit;cursor:pointer">일괄 치환</button>

<script>
let podoSeconds = 0, podoInterval = null, isPodoRunning = false;
function openPodo(){document.getElementById('podo-overlay').classList.add('open');}
function closePodo(){document.getElementById('podo-overlay').classList.remove('open');}
function startPodoMin(min){
  stopPodo();
  podoSeconds=min*60;
  updatePodoDisplay();
  closePodo();
  startPodo();
}
function updatePodoDisplay(){
  const m=Math.floor(podoSeconds/60),s=podoSeconds%60;
  const t=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('podo-display').textContent=t;
  document.getElementById('podo-float').textContent=isPodoRunning?`◷ ${t}`:'◷ 타이머';
}
function togglePodo(){isPodoRunning?stopPodo():startPodo();}
let isPodoPaused=false;
function togglePause(){
  if(isPodoPaused){
    isPodoPaused=false;
    document.getElementById('podo-pause').textContent='일시 정지';
    document.getElementById('podo-panel').classList.add('timer-running');
    podoInterval=setInterval(()=>{
      podoSeconds--;updatePodoDisplay();
      if(podoSeconds<=0){clearInterval(podoInterval);alert('집중 시간이 끝났습니다!');stopPodo();}
    },1000);
  } else {
    isPodoPaused=true;
    clearInterval(podoInterval);
    document.getElementById('podo-pause').textContent='계속';
    document.getElementById('podo-panel').classList.remove('timer-running');
  }
}
function startPodo(){
  isPodoRunning=true;isPodoPaused=false;
  const rb=document.getElementById('podo-running-btns');
  rb.style.display='flex';
  document.getElementById('podo-pause').textContent='일시 정지';
  document.getElementById('podo-panel').classList.add('timer-running');
  podoInterval=setInterval(()=>{
    podoSeconds--;updatePodoDisplay();
    if(podoSeconds<=0){clearInterval(podoInterval);alert('집중 시간이 끝났습니다!');stopPodo();}
  },1000);
}
function stopPodo(){
  isPodoRunning=false;isPodoPaused=false;clearInterval(podoInterval);
  podoSeconds=0;
  document.getElementById('podo-running-btns').style.display='none';
  document.getElementById('podo-panel').classList.remove('timer-running');
  updatePodoDisplay();
}

const editor=document.getElementById('editor');
const wrap=document.getElementById('editor-wrap');
const toolbar=document.getElementById('toolbar');
const canvas=document.getElementById('ruled-canvas');
const floatBtns=document.getElementById('float-btns');
const statusbar=document.getElementById('statusbar');

let menuVisible=true,darkMode=false,ruledOn=true,currentCols=2,isFullscreen=false;

/* ── 시스템 다크모드 ── */
function applySystemDark(){
  darkMode=window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.body.classList.toggle('dark',darkMode);
  const btn=document.getElementById('dark-btn');
  btn.textContent=darkMode?'☽ 다크 모드':'☽ 다크 모드';
  btn.classList.toggle('on',darkMode);
  drawRuled();
}
applySystemDark();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',applySystemDark);

function getFontSize(){return parseInt(document.getElementById('fontSize').value)}
function getLineHeight(){return parseFloat(document.getElementById('lineHeight').value)}
function getLineH(){return Math.round(getFontSize()*getLineHeight())}
function getPadX(){return window.innerWidth<600?28:80}
function sv(id,val){document.getElementById(id).textContent=val}

function copyAllText(){
  const text=getCleanText();
  if(!text.trim()){alert('복사할 내용이 없습니다.');return;}
  const done=()=>{
    const lbl=document.getElementById('autosave-label');
    const orig=lbl.textContent;
    lbl.textContent='복사 완료';lbl.classList.add('saved');
    setTimeout(()=>{lbl.classList.remove('saved');lbl.textContent=orig;},2000);
  };
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  else fallbackCopy(text,done);
}
function fallbackCopy(text,done){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');done();}catch(e){alert('복사에 실패했습니다.');}
  document.body.removeChild(ta);
}

function applyStyle(){
  const fs=getFontSize(),lh=getLineHeight();
  const lineH=Math.round(fs*lh),px=getPadX();
  const padTop=lineH*1.5,padBot=currentCols>1?lineH*2:lineH+26;
  const ff=document.getElementById('fontFamily').value;
  editor.style.fontFamily=ff;
  editor.style.fontWeight=ff.includes('Noto Serif')?'500':'400';
  editor.style.fontSize=fs+'px';
  editor.style.lineHeight=lh;
  editor.style.paddingLeft=px+'px';
  editor.style.paddingRight=px+'px';
  editor.style.paddingTop=padTop+'px';
  editor.style.paddingBottom=padBot+'px';
  drawRuled(lineH,padTop);
  if(currentCols>1)applyColumnLayout();
}

function drawRuled(lineH,padTop){
  if(lineH===undefined){lineH=getLineH();padTop=lineH*1.5;}
  if(currentCols===1){canvas.style.display='none';return;}
  canvas.style.display='block';
  const isDark=document.body.classList.contains('dark');
  const pageW=wrap.clientWidth,pageH=wrap.clientHeight;
  const W=pageW,H=pageH;
  if(W<10||H<10){setTimeout(()=>drawRuled(lineH,padTop),50);return;}
  if(canvas.width!==W||canvas.height!==H){
    canvas.width=W;canvas.height=H;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
  }
  const ctx=canvas.getContext('2d');
  if(!ctx){return;}
  ctx.clearRect(0,0,W,H);
  if(!ruledOn)return;
  /* 줄노트 라인: 다단 구분선과 동일한 색상 계열, 라이트/다크 모드 통일 */
  ctx.strokeStyle=isDark?'rgba(92,104,128,0.14)':'rgba(92,104,128,0.18)';
  ctx.lineWidth=1;
  for(let y=padTop;y<H;y+=lineH){
    const py=Math.floor(y)+0.5;
    ctx.beginPath();ctx.moveTo(0,py);ctx.lineTo(W,py);ctx.stroke();
  }
}
function toggleRuled(){
  ruledOn=!ruledOn;
  const btn=document.getElementById('ruled-btn');
  btn.textContent=ruledOn?'ON':'OFF';
  btn.classList.toggle('on',ruledOn);
  drawRuled();
}

function applyColumnLayout(){
  const vw=window.innerWidth,gap=currentCols===2?80:52;
  const lineH=getLineH();
  editor.style.width=vw+'px';editor.style.minWidth=vw+'px';
  editor.style.columnCount=String(currentCols);editor.style.columnGap=gap+'px';
  editor.style.columnWidth='';
  editor.style.height=(wrap.clientHeight+lineH)+'px';
}
function setCols(n){
  currentCols=n;
  [1,2,3].forEach(i=>document.getElementById('c'+i).classList.toggle('on',i===n));
  if(n===1){
    wrap.className='mode-single';
    editor.style.width='';editor.style.minWidth='';
    editor.style.columnCount='unset';editor.style.columnGap='';
    editor.style.columnWidth='';editor.style.columnFill='';
    editor.style.height='';wrap.style.scrollSnapType='';
    sv('page-ind-sb','');
    ruledOn=false;
    document.getElementById('ruled-btn').textContent='OFF';
    document.getElementById('ruled-btn').classList.remove('on');
  } else {
    wrap.className='mode-columns';
    editor.style.columnFill='auto';
    applyColumnLayout();updatePageInd();
    ruledOn=true;
    document.getElementById('ruled-btn').textContent='ON';
    document.getElementById('ruled-btn').classList.add('on');
  }
  applyStyle();setTimeout(drawRuled,50);
}
wrap.addEventListener('scroll',()=>{
  updatePageInd();
  canvas.style.left=wrap.scrollLeft+'px';
  canvas.style.top=wrap.scrollTop+'px';
});
function updatePageInd(){
  if(currentCols===1){sv('page-ind-sb','');return;}
  const page=Math.round(wrap.scrollLeft/wrap.clientWidth)+1;
  const total=Math.max(1,Math.ceil(wrap.scrollWidth/wrap.clientWidth));
  sv('page-ind-sb',page+' / '+total);
}
window.addEventListener('resize',()=>{if(currentCols>1)applyColumnLayout();applyStyle();});

/* ── 자동변환 ── */
let mutating=false,isComposing=false;
editor.addEventListener('compositionstart',()=>{isComposing=true;});
editor.addEventListener('compositionend',()=>{isComposing=false;});


function handleKey(e){
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='f'){e.preventDefault();openFind();return;}
  if(e.ctrlKey||e.metaKey){
    const k=e.key.toLowerCase();
    if(k==='b'){e.preventDefault();document.execCommand('bold',false,null);return;}
    if(k==='i'){e.preventDefault();document.execCommand('italic',false,null);return;}
    if(k==='s'){e.preventDefault();forceSave();return;}
  }
}

function getCleanText(){
  return (editor.innerText||'').replace(/\n\n\n+/g,'\n\n');
}

const observer=new MutationObserver(()=>{
  if(mutating||isComposing)return;
  const sel=window.getSelection();
  if(!sel||!sel.rangeCount)return;
  const range=sel.getRangeAt(0);
  const node=range.startContainer;
  if(node.nodeType!==Node.TEXT_NODE)return;
  let text=node.textContent,offset=range.startOffset,changed=false;
  if(!changed&&text[offset-1]==='<'){
    text=text.slice(0,offset-1)+'「'+text.slice(offset);changed=true;
  }
  if(!changed&&text[offset-1]==='>'){
    text=text.slice(0,offset-1)+'」'+text.slice(offset);changed=true;
  }
  if(!changed&&text.slice(0,offset).endsWith(',,')){
    const p=offset-2;text=text.slice(0,p)+'―'+text.slice(offset);offset=p+1;changed=true;
  }
  if(!changed&&text.slice(0,offset).endsWith('...')){
    const p=offset-3;text=text.slice(0,p)+'…'+text.slice(offset);offset=p+1;changed=true;
  }
  if(!changed&&text[offset-1]==='"'){
    const b=text.slice(0,offset-1);
    const q=(b.match(/\u201C/g)||[]).length>(b.match(/\u201D/g)||[]).length?'\u201D':'\u201C';
    text=text.slice(0,offset-1)+q+text.slice(offset);changed=true;
  }
  if(!changed&&text[offset-1]==="'"){
    const b=text.slice(0,offset-1);
    const q=(b.match(/\u2018/g)||[]).length>(b.match(/\u2019/g)||[]).length?'\u2019':'\u2018';
    text=text.slice(0,offset-1)+q+text.slice(offset);changed=true;
  }
  if(changed){
    mutating=true;
    node.textContent=text;
    const r=document.createRange();r.setStart(node,offset);r.collapse(true);
    sel.removeAllRanges();sel.addRange(r);
    setTimeout(()=>{mutating=false;},0);
  }
});

function applySmartQuotes(){
  const walker=document.createTreeWalker(editor,NodeFilter.SHOW_TEXT);
  const nodes=[];
  while(walker.nextNode())nodes.push(walker.currentNode);
  let total=0;
  nodes.forEach(n=>{total+=(n.textContent.match(/"/g)||[]).length;});
  if(total===0){alert('변환할 " 가 없습니다.');return;}
  if(total%2!==0){alert('" 의 개수가 홀수입니다. 확인 후 다시 시도해주세요.');return;}
  let count=0;
  nodes.forEach(node=>{
    if(!node.textContent.includes('"'))return;
    let t=node.textContent,result='';
    for(let i=0;i<t.length;i++){
      if(t[i]==='"'){result+=count%2===0?'\u201C':'\u201D';count++;}
      else result+=t[i];
    }
    node.textContent=result;
  });
  onEdit();
  alert(`" ${total}개를 " " 로 변환했습니다.`);
}

function applySmartSingleQuotes(){
  const walker=document.createTreeWalker(editor,NodeFilter.SHOW_TEXT);
  const nodes=[];
  while(walker.nextNode())nodes.push(walker.currentNode);
  let total=0;
  nodes.forEach(n=>{total+=(n.textContent.match(/'/g)||[]).length;});
  if(total===0){alert("변환할 ' 가 없습니다.");return;}
  if(total%2!==0){alert("' 의 개수가 홀수입니다. 확인 후 다시 시도해주세요.");return;}
  let count=0;
  nodes.forEach(node=>{
    if(!node.textContent.includes("'"))return;
    let t=node.textContent,result='';
    for(let i=0;i<t.length;i++){
      if(t[i]==="'"){result+=count%2===0?'\u2018':'\u2019';count++;}
      else result+=t[i];
    }
    node.textContent=result;
  });
  onEdit();
  alert(`' ${total}개를 ' ' 로 변환했습니다.`);
}

function applyAllSmartQuotes(){
  let msgs=[];
  // 큰따옴표
  const walker1=document.createTreeWalker(editor,NodeFilter.SHOW_TEXT);
  const nodes1=[];while(walker1.nextNode())nodes1.push(walker1.currentNode);
  let dq=0;nodes1.forEach(n=>{dq+=(n.textContent.match(/"/g)||[]).length;});
  if(dq>0&&dq%2!==0){msgs.push('" 의 개수가 홀수입니다.');}
  else if(dq>0){
    let count=0;
    nodes1.forEach(node=>{
      if(!node.textContent.includes('"'))return;
      let t=node.textContent,result='';
      for(let i=0;i<t.length;i++){
        if(t[i]==='"'){result+=count%2===0?'\u201C':'\u201D';count++;}
        else result+=t[i];
      }
      node.textContent=result;
    });
  }
  // 작은따옴표
  const walker2=document.createTreeWalker(editor,NodeFilter.SHOW_TEXT);
  const nodes2=[];while(walker2.nextNode())nodes2.push(walker2.currentNode);
  let sq=0;nodes2.forEach(n=>{sq+=(n.textContent.match(/'/g)||[]).length;});
  if(sq>0&&sq%2!==0){msgs.push("' 의 개수가 홀수입니다.");}
  else if(sq>0){
    let count=0;
    nodes2.forEach(node=>{
      if(!node.textContent.includes("'"))return;
      let t=node.textContent,result='';
      for(let i=0;i<t.length;i++){
        if(t[i]==="'"){result+=count%2===0?'\u2018':'\u2019';count++;}
        else result+=t[i];
      }
      node.textContent=result;
    });
  }
  if(dq===0&&sq===0){alert('변환할 따옴표가 없습니다.');return;}
  onEdit();
  if(msgs.length)alert(msgs.join('\n')+'\n해당 항목은 변환되지 않았습니다.');
  else alert('따옴표 변환이 완료되었습니다.');
}
function applyRepRules(){
  if(!repRules.length){alert('등록된 치환 규칙이 없습니다.');return;}
  let html=editor.innerHTML;
  repRules.forEach(r=>{
    html=html.split(r.from).join(r.to);
  });
  editor.innerHTML=html;
  onEdit();
  alert('일괄 치환이 완료되었습니다.');
}

function srepAll(){

  const walker=document.createTreeWalker(editor,NodeFilter.SHOW_TEXT);

const SETTINGS_KEY='wt-settings';
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}');
    // 줄노트
    ruledOn = s.ruled !== undefined ? s.ruled : true;
    updateRuledBtn();
    // 줄바꿈
    const wb = s.wordBreak || 'keep-all';
    editor.style.wordBreak = wb;
    updateWordBreakBtn(wb);
  }catch(e){}
}
function saveSettings(){
  try{
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      ruled: ruledOn,
      wordBreak: editor.style.wordBreak || 'keep-all'
    }));
  }catch(e){}
}
function updateRuledBtn(){
  const btn=document.getElementById('settings-ruled-btn');
  if(!btn)return;
  btn.textContent=ruledOn?'ON':'OFF';
  btn.style.background=ruledOn?'var(--accent)':'var(--grape-input-bg)';
  btn.style.color=ruledOn?'#1a1a1a':'var(--grape-text)';
  btn.style.borderColor=ruledOn?'var(--accent)':'var(--grape-input-bd)';
}
function updateWordBreakBtn(wb){
  const keep=document.getElementById('wb-keep');
  const brk=document.getElementById('wb-break');
  if(!keep||!brk)return;
  const on='var(--accent)',onC='#1a1a1a',off='var(--grape-input-bg)',offC='var(--grape-text)',offBd='var(--grape-input-bd)';
  if(wb==='keep-all'){
    keep.style.background=on;keep.style.color=onC;keep.style.borderColor=on;
    brk.style.background=off;brk.style.color=offC;brk.style.borderColor=offBd;
  } else {
    brk.style.background=on;brk.style.color=onC;brk.style.borderColor=on;
    keep.style.background=off;keep.style.color=offC;keep.style.borderColor=offBd;
  }
}
function settingsToggleRuled(){

let scrollTimer=null;
function scrollToCursor(){
  if(currentCols===1)return;
  clearTimeout(scrollTimer);
  scrollTimer=setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||!sel.rangeCount)return;
    const range=sel.getRangeAt(0).cloneRange();
    range.collapse(true);
    const rect=range.getBoundingClientRect();
    if(rect.width===0&&rect.height===0)return;
    const wrapRect=wrap.getBoundingClientRect();
    const margin=wrapRect.width*0.025;
    if(rect.right>wrapRect.right-margin){
      wrap.scrollBy({left:Math.min(rect.right-(wrapRect.right-margin),wrap.clientWidth*0.5),behavior:'smooth'});
    } else if(rect.left<wrapRect.left+margin){
      wrap.scrollBy({left:rect.left-(wrapRect.left+margin),behavior:'smooth'});
    }
  },50);
}
editor.addEventListener('compositionend',scrollToCursor);

/* ── 찾기 ── */
let findMatches=[],findIdx=0;
const FIND_MARK='cmmk-highlight';
function openFind(){
  document.getElementById('find-bar').style.display='flex';
  document.getElementById('find-input').focus();
  document.getElementById('find-input').select();
}
function closeFind(){
  document.getElementById('find-bar').style.display='none';
  clearFindMarks();findMatches=[];
  document.getElementById('find-count').textContent='';
}
function clearFindMarks(){
  document.querySelectorAll('mark.'+FIND_MARK).forEach(m=>m.replaceWith(...m.childNodes));
  editor.normalize();
}
function findText(){
  clearFindMarks();findMatches=[];findIdx=0;
  const q=document.getElementById('find-input').value;
  if(!q){document.getElementById('find-count').textContent='';return;}
  const walker=document.createTreeWalker(editor,NodeFilter.SHOW_TEXT);
  const nodes=[];
  while(walker.nextNode())nodes.push(walker.currentNode);
  nodes.forEach(node=>{
    const lq=q.toLowerCase();
    let remaining=node.textContent,lt=remaining.toLowerCase(),idx=lt.indexOf(lq);
    if(idx===-1)return;
    const frag=document.createDocumentFragment();
    while(idx!==-1){
      if(idx>0)frag.appendChild(document.createTextNode(remaining.slice(0,idx)));
      const mark=document.createElement('mark');
      mark.className=FIND_MARK;
      mark.style.cssText='background:#f0c040;color:#1a1a1a;border-radius:2px;';
      mark.textContent=remaining.slice(idx,idx+q.length);
      frag.appendChild(mark);findMatches.push(mark);
      remaining=remaining.slice(idx+q.length);lt=remaining.toLowerCase();idx=lt.indexOf(lq);
    }
    if(remaining)frag.appendChild(document.createTextNode(remaining));
    node.replaceWith(frag);
  });
  document.getElementById('find-count').textContent=findMatches.length?`1 / ${findMatches.length}`:'없음';
  if(findMatches.length){findIdx=0;scrollToMatch(0);}
}
function scrollToMatch(i){
  findMatches.forEach((m,j)=>m.style.background=j===i?'#f08000':'#f0c040');
  findMatches[i]?.scrollIntoView({block:'center',behavior:'smooth'});
  document.getElementById('find-count').textContent=`${i+1} / ${findMatches.length}`;
}
function findMove(dir){
  if(!findMatches.length)return;
  findIdx=(findIdx+dir+findMatches.length)%findMatches.length;
  scrollToMatch(findIdx);
}
function findKeyNav(e){
  if(e.key==='Enter'){e.preventDefault();findMove(e.shiftKey?-1:1);}
  if(e.key==='Escape')closeFind();
}
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='f'){e.preventDefault();openFind();}
  if(e.key==='Escape'&&document.getElementById('find-bar').style.display==='flex')closeFind();
});
</script>

<script>
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='cmmk-v1';
    self.addEventListener('install',e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll([location.pathname||'/'])));
      self.skipWaiting();
    });
    self.addEventListener('activate',e=>{self.clients.claim();});
    self.addEventListener('fetch',e=>{
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
        const rc=res.clone();
        caches.open(CACHE).then(c=>c.put(e.request,rc));
        return res;
      })));
    });
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
